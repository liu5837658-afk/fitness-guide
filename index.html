<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身房器材使用指南</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #8892b0;
            font-size: 16px;
        }
        
        /* 部位选择 */
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #ccd6f6;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 2px;
        }
        
        .body-parts {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .part-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .part-btn:hover {
            border-color: #f093fb;
            background: rgba(240, 147, 251, 0.1);
            transform: translateY(-2px);
        }
        
        .part-btn.active {
            border-color: #f5576c;
            background: rgba(245, 87, 108, 0.2);
        }
        
        .part-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .part-name {
            font-size: 16px;
            font-weight: 600;
        }
        
        /* 器材和动作展示 */
        .exercises-section {
            display: none;
        }
        
        .exercises-section.show {
            display: block;
        }
        
        .exercises-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .exercise-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        
        .exercise-card:hover {
            transform: translateY(-5px);
        }
        
        .exercise-gif {
            width: 100%;
            height: 300px;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .exercise-gif img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .exercise-gif .placeholder {
            color: #8892b0;
            text-align: center;
            padding: 20px;
        }
        
        .exercise-gif .placeholder .icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        .exercise-info {
            padding: 20px;
        }
        
        .exercise-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ccd6f6;
        }
        
        .exercise-equipment {
            display: inline-block;
            background: rgba(240, 147, 251, 0.2);
            color: #f093fb;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 15px;
        }
        
        .exercise-details {
            margin-top: 15px;
        }
        
        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }
        
        .detail-icon {
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .detail-content h4 {
            font-size: 14px;
            color: #f093fb;
            margin-bottom: 5px;
        }
        
        .detail-content p {
            font-size: 14px;
            color: #a8b2d1;
            line-height: 1.6;
        }
        
        .tips-list {
            list-style: none;
            margin-top: 10px;
        }
        
        .tips-list li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
            color: #a8b2d1;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .tips-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #64ffda;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px;
            color: #8892b0;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #f093fb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            h1 {
                font-size: 28px;
            }
            
            .body-parts {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .exercises-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        // DOM 元素
        const partBtns = document.querySelectorAll('.part-btn');
        const exercisesSection = document.getElementById('exercisesSection');
        const exercisesGrid = document.getElementById('exercisesGrid');
        
        // 当前选中的部位
        let currentPart = null;
        
        // 绑定部位按钮事件
        partBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const part = btn.dataset.part;
                
                // 更新按钮状态
                partBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // 如果点击同一个部位，隐藏展示区
                if (currentPart === part) {
                    exercisesSection.classList.remove('show');
                    currentPart = null;
                    btn.classList.remove('active');
                    return;
                }
                
                currentPart = part;
                showExercises(part);
            });
        });
        
        // 显示动作
        function showExercises(part) {
            const exercises = exercisesDB[part];
            
            if (!exercises || exercises.length === 0) {
                exercisesGrid.innerHTML = '<div class="loading"><p>暂无该部位的动作数据</p></div>';
                exercisesSection.classList.add('show');
                return;
            }
            
            // 显示加载状态
            exercisesGrid.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>加载动作数据...</p></div>';
            exercisesSection.classList.add('show');
            
            // 模拟加载延迟
            setTimeout(() => {
                exercisesGrid.innerHTML = exercises.map(exercise => createExerciseCard(exercise)).join('');
            }, 300);
        }
        
        // 创建动作卡片
        function createExerciseCard(exercise) {
            return `
                <div class="exercise-card">
                    <div class="exercise-gif">
                        <div class="placeholder">
                            <div class="icon">🏋️‍♂️</div>
                            <p>动作演示</p>
                            <p style="font-size:12px;margin-top:5px">GIF 加载中...</p>
                        </div>
                    </div>
                    <div class="exercise-info">
                        <div class="exercise-name">${exercise.name}</div>
                        <div class="exercise-equipment">器材：${exercise.equipment}</div>
                        
                        <div class="exercise-details">
                            <div class="detail-item">
                                <div class="detail-icon">🎯</div>
                                <div class="detail-content">
                                    <h4>目标肌群</h4>
                                    <p>${exercise.target}</p>
                                </div>
                            </div>
                            
                            <div class="detail-item">
                                <div class="detail-icon">📝</div>
                                <div class="detail-content">
                                    <h4>动作步骤</h4>
                                    <ol style="color:#a8b2d1;font-size:14px;line-height:1.8;padding-left:20px">
                                        ${exercise.steps.map(step => `<li>${step}</li>`).join('')}
                                    </ol>
                                </div>
                            </div>
                            
                            <div class="detail-item">
                                <div class="detail-icon">💡</div>
                                <div class="detail-content">
                                    <h4>注意事项</h4>
                                    <ul class="tips-list">
                                        ${exercise.tips.map(tip => `<li>${tip}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
